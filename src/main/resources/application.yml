server:
  port: ${PORT:8080}

spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:campus_health;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

ai:
  api-key: ${AI_API_KEY:demo-key}
  endpoint: ${AI_API_ENDPOINT:}
  model: ${AI_MODEL:gpt-4o-mini}

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:campus_health}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQLUSER:root}
    password: ${MYSQLPASSWORD:password}
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
